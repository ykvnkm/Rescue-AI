services:
  postgres:
    image: postgres:16
    container_name: rescue-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rescue_ai
      POSTGRES_USER: rescue_ai
      POSTGRES_PASSWORD: rescue_ai_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescue_ai -d rescue_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
