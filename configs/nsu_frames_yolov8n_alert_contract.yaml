name: nsu_frames_yolov8n_alert_contract
reason: "Локальный поток кадров: единый контракт инференса, алертов и метрик миссии."
model_url: https://storage.yandexcloud.net/rescue-ai-models-public/models/yolov8n_baseline_multiscale/v1/yolov8n_baseline_multiscale.pt
device: cpu

dataset:
  fps: 6.0

infer:
  imgsz: 960
  conf_min: 0.001
  nms_iou: 0.75
  max_det: 1000

alert:
  window_sec: 1.0
  quorum_k: 1
  cooldown_sec: 1.5
  gap_end_sec: 1.2
  gt_gap_end_sec: 1.0
  match_tolerance_sec: 1.2
  operator_confirm_delay_sec: 2.5
  min_detections_per_frame: 1

eval:
  target_recall: 0.90
  fp_per_min_target: 1.0
  thresholds: [0.20, 0.24, 0.28, 0.30, 0.32, 0.35, 0.38, 0.40, 0.45]
