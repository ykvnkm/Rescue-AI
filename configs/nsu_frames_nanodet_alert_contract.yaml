name: nsu_frames_nanodet_alert_contract
reason: "Локальный поток кадров: контракт для NanoDet-Plus (pth основной, onnx фолбэк)."
model_url: https://github.com/ykvnkm/rescueai-models/releases/download/v1/nanodet-plus-m-1.5x_416.pth
device: cpu

detector:
  name: nanodet
  nanodet:
    config_url: configs/nanodet-plus-m-1.5x_416.yml
    onnx_url: https://github.com/ykvnkm/rescueai-models/releases/download/v1.1.0-onnx/nanodet-plus-m-1.5x_416.onnx

dataset:
  fps: 6.0

infer:
  imgsz: 416
  conf_min: 0.001
  nms_iou: 0.6
  max_det: 100

alert:
  window_sec: 1.0
  quorum_k: 1
  cooldown_sec: 1.5
  gap_end_sec: 1.2
  gt_gap_end_sec: 1.0
  match_tolerance_sec: 1.2
  operator_confirm_delay_sec: 2.5
  min_detections_per_frame: 1

eval:
  target_recall: 0.90
  fp_per_min_target: 1.0
  thresholds: [0.30, 0.35, 0.40, 0.45, 0.50]
