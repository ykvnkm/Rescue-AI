name: CD Stub

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print deploy plan
        run: |
          echo "Deployment skeleton for ${{ inputs.target_env }}"
          echo "1) Build api + batch images"
          echo "2) Push images to registry"
          echo "3) Apply infra changes (Airflow/Postgres/S3)"
          echo "4) Run smoke tests (batch runner + DAG import)"
