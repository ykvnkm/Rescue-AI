name: Platform CI

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/platform-ci.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/platform-ci.yml"
  workflow_dispatch:

jobs:
  validate-platform-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: PLATFORM_ENV_FILE=./platform.env.example docker compose -f infra/docker-compose.platform.yml --env-file infra/platform.env.example config > /dev/null
