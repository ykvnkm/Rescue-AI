name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Detect if Docker images need rebuilding ────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      airflow: ${{ steps.filter.outputs.airflow }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'rescue_ai/**'
              - 'configs/**'
              - 'scripts/**'
            airflow:
              - 'infra/airflow/**'

  # ── 2. Build and push images to GHCR ──────────────────────────
  build-online:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: online
          push: true
          cache-from: type=gha,scope=online
          cache-to: type=gha,scope=online,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:sha-${{ github.sha }}

  build-batch:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: batch
          push: true
          cache-from: type=gha,scope=batch
          cache-to: type=gha,scope=batch,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:sha-${{ github.sha }}

  build-airflow:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.airflow == 'true'
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: infra/airflow
          push: true
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,scope=airflow,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-airflow:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-airflow:sha-${{ github.sha }}

  # ── 3. Deploy to remote server ────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-online, build-batch, build-airflow]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions: { contents: read, packages: read }

    steps:
      - uses: actions/checkout@v4

      - name: Upload infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "infra/docker-compose.platform.yml,infra/airflow"
          target: ~/rescue-ai
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          ARTIFACTS_S3_ENDPOINT: ${{ secrets.ARTIFACTS_S3_ENDPOINT }}
          ARTIFACTS_S3_REGION: ${{ secrets.ARTIFACTS_S3_REGION }}
          ARTIFACTS_S3_ACCESS_KEY_ID: ${{ secrets.ARTIFACTS_S3_ACCESS_KEY_ID }}
          ARTIFACTS_S3_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACTS_S3_SECRET_ACCESS_KEY }}
          ARTIFACTS_S3_BUCKET: ${{ secrets.ARTIFACTS_S3_BUCKET }}
          RPI_BASE_URL: ${{ secrets.RPI_BASE_URL }}
          RPI_MISSIONS_DIR: ${{ secrets.RPI_MISSIONS_DIR }}
          RPI_RTSP_PORT: ${{ secrets.RPI_RTSP_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
          APP_CHANGED: ${{ needs.changes.outputs.app }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DB_DSN,ARTIFACTS_S3_ENDPOINT,ARTIFACTS_S3_REGION,ARTIFACTS_S3_ACCESS_KEY_ID,ARTIFACTS_S3_SECRET_ACCESS_KEY,ARTIFACTS_S3_BUCKET,RPI_BASE_URL,RPI_MISSIONS_DIR,RPI_RTSP_PORT,GHCR_TOKEN,GHCR_USERNAME,AIRFLOW_ADMIN_USER,AIRFLOW_ADMIN_PASSWORD,AIRFLOW_ADMIN_EMAIL,APP_CHANGED,GIT_SHA
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="$HOME/rescue-ai"
            OWNER="ykvnkm"

            # ── Resolve image tags ──
            TAG="latest"
            if [ "${APP_CHANGED}" = "true" ]; then
              TAG="sha-${GIT_SHA}"
            fi

            export ONLINE_IMAGE="ghcr.io/${OWNER}/rescue-ai-online:${TAG}"
            export BATCH_IMAGE="ghcr.io/${OWNER}/rescue-ai-batch:${TAG}"
            export AIRFLOW_IMAGE="ghcr.io/${OWNER}/rescue-ai-airflow:latest"
            export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"

            # ── Login to GHCR and pull images ──
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker pull "${ONLINE_IMAGE}"
            docker pull "${BATCH_IMAGE}"
            docker pull "${AIRFLOW_IMAGE}"

            # ── Write .env for online service ──
            cat > "${APP_DIR}/.env" <<ENVEOF
            APP_HOST=0.0.0.0
            APP_PORT=8000
            DB_DSN=${DB_DSN}
            ARTIFACTS_S3_ENDPOINT=${ARTIFACTS_S3_ENDPOINT}
            ARTIFACTS_S3_REGION=${ARTIFACTS_S3_REGION}
            ARTIFACTS_S3_ACCESS_KEY_ID=${ARTIFACTS_S3_ACCESS_KEY_ID}
            ARTIFACTS_S3_SECRET_ACCESS_KEY=${ARTIFACTS_S3_SECRET_ACCESS_KEY}
            ARTIFACTS_S3_BUCKET=${ARTIFACTS_S3_BUCKET}
            ARTIFACTS_S3_PREFIX=missions
            RPI_BASE_URL=${RPI_BASE_URL}
            RPI_MISSIONS_DIR=${RPI_MISSIONS_DIR}
            RPI_RTSP_PORT=${RPI_RTSP_PORT}
            RPI_RTSP_PATH_PREFIX=live
            RPI_TIMEOUT_SEC=10
            ENVEOF
            sed -i 's/^[[:space:]]*//' "${APP_DIR}/.env"

            # ── Write platform.env for Airflow stack ──
            # Used both for compose interpolation (--env-file) and container env (env_file:)
            cat > "${APP_DIR}/infra/platform.env" <<ENVEOF
            AIRFLOW_DB_USER=airflow
            AIRFLOW_DB_PASSWORD=airflow
            AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}
            AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
            AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}
            DB_DSN=${DB_DSN}
            ARTIFACTS_S3_ENDPOINT=${ARTIFACTS_S3_ENDPOINT}
            ARTIFACTS_S3_REGION=${ARTIFACTS_S3_REGION}
            ARTIFACTS_S3_ACCESS_KEY_ID=${ARTIFACTS_S3_ACCESS_KEY_ID}
            ARTIFACTS_S3_SECRET_ACCESS_KEY=${ARTIFACTS_S3_SECRET_ACCESS_KEY}
            ARTIFACTS_S3_BUCKET=${ARTIFACTS_S3_BUCKET}
            ARTIFACTS_S3_PREFIX=missions
            ENVEOF
            sed -i 's/^[[:space:]]*//' "${APP_DIR}/infra/platform.env"

            # ── Initialize app schema in Supabase (idempotent) ──
            docker run --rm \
              --env-file "${APP_DIR}/.env" \
              "${ONLINE_IMAGE}" \
              uv run python -m rescue_ai.interfaces.cli.init_remote_db

            echo "App schema initialized"

            # ── Deploy online service ──
            docker rm -f rescue-ai-online 2>/dev/null || true
            docker run -d \
              --name rescue-ai-online \
              --restart unless-stopped \
              --env-file "${APP_DIR}/.env" \
              -p 8000:8000 \
              "${ONLINE_IMAGE}"

            echo "Online service deployed: ${ONLINE_IMAGE}"

            # ── Deploy Airflow stack ──
            # AIRFLOW_IMAGE, BATCH_IMAGE, DOCKER_GID are exported above —
            # docker compose reads them from the shell environment.
            cd "${APP_DIR}/infra"

            docker compose --env-file platform.env \
              -f docker-compose.platform.yml \
              pull --ignore-buildable 2>/dev/null || true

            docker compose --env-file platform.env \
              -f docker-compose.platform.yml \
              up -d airflow-webserver airflow-scheduler

            echo "Airflow stack deployed"

            # ── Health check ──
            sleep 5
            curl -sf http://127.0.0.1:8000/health || echo "WARNING: online health check failed"

            echo "Deploy complete"
