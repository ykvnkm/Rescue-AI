name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      images_changed: ${{ steps.filter.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect image-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            images:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'rescue_ai/**'
              - 'configs/**'
              - 'scripts/**'

  build-online:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.images_changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push online image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: online
          push: true
          cache-from: type=gha,scope=rescue-ai-online
          cache-to: type=gha,scope=rescue-ai-online,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:sha-${{ github.sha }}

  build-batch:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.images_changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push batch image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: batch
          push: true
          cache-from: type=gha,scope=rescue-ai-batch
          cache-to: type=gha,scope=rescue-ai-batch,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-online.result == 'success' || needs.build-online.result == 'skipped') &&
      (needs.build-batch.result == 'success' || needs.build-batch.result == 'skipped')
    needs:
      - changes
      - build-online
      - build-batch
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Airflow infra to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "infra/docker-compose.platform.yml,infra/airflow"
          target: ~/rescue-ai
          strip_components: 0

      - name: Deploy online + Airflow DAG stack via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE_TAG="latest"
            if [ "${{ needs.changes.outputs.images_changed }}" = "true" ]; then
              IMAGE_TAG="sha-${{ github.sha }}"
            fi

            ONLINE_IMAGE="ghcr.io/${{ github.repository_owner }}/rescue-ai-online:${IMAGE_TAG}"
            BATCH_IMAGE="ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:${IMAGE_TAG}"
            APP_DIR="$HOME/rescue-ai"
            AIRFLOW_DB_DSN="${{ secrets.AIRFLOW_DB_DSN }}"
            DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"
            if [ -z "$AIRFLOW_DB_DSN" ]; then
              AIRFLOW_DB_DSN="${{ secrets.DB_DSN }}"
            fi
            mkdir -p "$APP_DIR"
            mkdir -p "$APP_DIR/infra"

            {
              printf 'APP_HOST=%s\n' '0.0.0.0'
              printf 'APP_PORT=%s\n' '8000'
              printf 'APP_POSTGRES_READY_TIMEOUT_SEC=%s\n' '30'
              printf 'DB_DSN=%s\n' '${{ secrets.DB_DSN }}'
              printf 'ARTIFACTS_S3_ENDPOINT=%s\n' '${{ secrets.ARTIFACTS_S3_ENDPOINT }}'
              printf 'ARTIFACTS_S3_REGION=%s\n' '${{ secrets.ARTIFACTS_S3_REGION }}'
              printf 'ARTIFACTS_S3_ACCESS_KEY_ID=%s\n' '${{ secrets.ARTIFACTS_S3_ACCESS_KEY_ID }}'
              printf 'ARTIFACTS_S3_SECRET_ACCESS_KEY=%s\n' '${{ secrets.ARTIFACTS_S3_SECRET_ACCESS_KEY }}'
              printf 'ARTIFACTS_S3_BUCKET=%s\n' '${{ secrets.ARTIFACTS_S3_BUCKET }}'
              printf 'ARTIFACTS_S3_PREFIX=%s\n' 'missions'
              printf 'RPI_BASE_URL=%s\n' '${{ secrets.RPI_BASE_URL }}'
              printf 'RPI_MISSIONS_DIR=%s\n' '${{ secrets.RPI_MISSIONS_DIR }}'
              printf 'RPI_RTSP_PORT=%s\n' '${{ secrets.RPI_RTSP_PORT }}'
              printf 'RPI_RTSP_PATH_PREFIX=%s\n' 'live'
              printf 'RPI_TIMEOUT_SEC=%s\n' '10'
            } > "$APP_DIR/.env"

            cp "$APP_DIR/.env" "$APP_DIR/infra/platform.env"
            {
              printf 'AIRFLOW_DB_DSN=%s\n' "$AIRFLOW_DB_DSN"
              printf 'DOCKER_GID=%s\n' "$DOCKER_GID"
              printf 'AIRFLOW_ADMIN_USER=%s\n' '${{ secrets.AIRFLOW_ADMIN_USER }}'
              printf 'AIRFLOW_ADMIN_PASSWORD=%s\n' '${{ secrets.AIRFLOW_ADMIN_PASSWORD }}'
              printf 'AIRFLOW_ADMIN_EMAIL=%s\n' '${{ secrets.AIRFLOW_ADMIN_EMAIL }}'
              printf 'BATCH_IMAGE=%s\n' "$BATCH_IMAGE"
            } >> "$APP_DIR/infra/platform.env"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$ONLINE_IMAGE"
            docker pull "$BATCH_IMAGE"

            docker run --rm \
              --env-file "$APP_DIR/.env" \
              "$ONLINE_IMAGE" \
              python -c "import os, psycopg; dsn=os.environ['DB_DSN']; conn=psycopg.connect(dsn); cur=conn.cursor(); cur.execute('CREATE SCHEMA IF NOT EXISTS app'); cur.execute('CREATE SCHEMA IF NOT EXISTS airflow'); conn.commit(); conn.close()"

            docker rm -f rescue-ai-online || true
            docker run -d \
              --name rescue-ai-online \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p 8000:8000 \
              "$ONLINE_IMAGE"

            # Run Airflow init in foreground: immediate logs and fast-fail.
            if ! timeout 300 docker compose \
              -f "$APP_DIR/infra/docker-compose.platform.yml" \
              --env-file "$APP_DIR/infra/platform.env" \
              run --rm airflow-init; then
              echo "airflow-init timed out or failed; dumping diagnostics"
              docker compose \
                -f "$APP_DIR/infra/docker-compose.platform.yml" \
                --env-file "$APP_DIR/infra/platform.env" \
                ps || true
              docker logs "$(docker ps -aqf name=rescue-platform-airflow-init-run | head -n 1)" || true
              exit 1
            fi

            docker compose \
              -f "$APP_DIR/infra/docker-compose.platform.yml" \
              --env-file "$APP_DIR/infra/platform.env" \
              up -d airflow-webserver airflow-scheduler
