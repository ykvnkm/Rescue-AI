name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-online:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: online
          push: true
          cache-from: type=gha,scope=online
          cache-to: type=gha,scope=online,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-online:${{ github.sha }}

  build-batch:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: batch
          push: true
          cache-from: type=gha,scope=batch
          cache-to: type=gha,scope=batch,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:latest
            ghcr.io/${{ github.repository_owner }}/rescue-ai-batch:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-online, build-batch]
    permissions: { contents: read, packages: read }

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          ARTIFACTS_S3_ENDPOINT: ${{ secrets.ARTIFACTS_S3_ENDPOINT }}
          ARTIFACTS_S3_REGION: ${{ secrets.ARTIFACTS_S3_REGION }}
          ARTIFACTS_S3_ACCESS_KEY_ID: ${{ secrets.ARTIFACTS_S3_ACCESS_KEY_ID }}
          ARTIFACTS_S3_SECRET_ACCESS_KEY: ${{ secrets.ARTIFACTS_S3_SECRET_ACCESS_KEY }}
          ARTIFACTS_S3_BUCKET: ${{ secrets.ARTIFACTS_S3_BUCKET }}
          RPI_BASE_URL: ${{ secrets.RPI_BASE_URL }}
          RPI_MISSIONS_DIR: ${{ secrets.RPI_MISSIONS_DIR }}
          RPI_RTSP_PORT: ${{ secrets.RPI_RTSP_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
          GIT_SHA: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DB_DSN,ARTIFACTS_S3_ENDPOINT,ARTIFACTS_S3_REGION,ARTIFACTS_S3_ACCESS_KEY_ID,ARTIFACTS_S3_SECRET_ACCESS_KEY,ARTIFACTS_S3_BUCKET,RPI_BASE_URL,RPI_MISSIONS_DIR,RPI_RTSP_PORT,GHCR_TOKEN,GHCR_USERNAME,AIRFLOW_DB_USER,AIRFLOW_DB_PASSWORD,AIRFLOW_ADMIN_USER,AIRFLOW_ADMIN_PASSWORD,AIRFLOW_ADMIN_EMAIL,GIT_SHA,OWNER
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="$HOME/rescue-ai"

            export ONLINE_IMAGE="ghcr.io/${OWNER}/rescue-ai-online:${GIT_SHA}"
            export BATCH_IMAGE="ghcr.io/${OWNER}/rescue-ai-batch:${GIT_SHA}"
            export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"

            mkdir -p "${APP_DIR}/infra"

            cat > "${APP_DIR}/infra/docker-compose.platform.yml" <<'YAMLEOF'
            name: rescue-platform

            x-airflow-common: &airflow-common
              environment: &airflow-env
                AIRFLOW__CORE__EXECUTOR: LocalExecutor
                AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/airflow
                AIRFLOW__CORE__LOAD_EXAMPLES: "False"

            services:
              airflow-db:
                image: postgres:16
                restart: unless-stopped
                environment:
                  POSTGRES_USER: ${AIRFLOW_DB_USER}
                  POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
                  POSTGRES_DB: airflow
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d airflow"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                volumes:
                  - airflow_db_data:/var/lib/postgresql/data

              airflow-init:
                image: ${BATCH_IMAGE}
                depends_on:
                  airflow-db:
                    condition: service_healthy
                <<: *airflow-common
                env_file:
                  - platform.env
                command: >-
                  bash -c "airflow db migrate
                  && airflow users create
                  --username $${AIRFLOW_ADMIN_USER}
                  --firstname Platform
                  --lastname Admin
                  --role Admin
                  --email $${AIRFLOW_ADMIN_EMAIL}
                  --password $${AIRFLOW_ADMIN_PASSWORD}"
                restart: "no"

              airflow-webserver:
                image: ${BATCH_IMAGE}
                restart: unless-stopped
                depends_on:
                  airflow-db:
                    condition: service_healthy
                  airflow-init:
                    condition: service_completed_successfully
                <<: *airflow-common
                environment:
                  <<: *airflow-env
                  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
                  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
                  BATCH_IMAGE: ${BATCH_IMAGE}
                env_file:
                  - platform.env
                volumes:
                  - airflow_logs:/opt/airflow/logs
                  - /var/run/docker.sock:/var/run/docker.sock
                group_add:
                  - "${DOCKER_GID}"
                ports:
                  - "8080:8080"
                command: airflow webserver

              airflow-scheduler:
                image: ${BATCH_IMAGE}
                restart: unless-stopped
                depends_on:
                  airflow-db:
                    condition: service_healthy
                  airflow-init:
                    condition: service_completed_successfully
                <<: *airflow-common
                environment:
                  <<: *airflow-env
                  BATCH_IMAGE: ${BATCH_IMAGE}
                env_file:
                  - platform.env
                volumes:
                  - airflow_logs:/opt/airflow/logs
                  - /var/run/docker.sock:/var/run/docker.sock
                group_add:
                  - "${DOCKER_GID}"
                command: airflow scheduler

            volumes:
              airflow_db_data:
              airflow_logs:
            YAMLEOF
            sed -i 's/^            //' "${APP_DIR}/infra/docker-compose.platform.yml"

            # ── Login to GHCR and pull app images ──
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker pull "${ONLINE_IMAGE}"
            docker pull "${BATCH_IMAGE}"

            # ── Write .env for online service ──
            cat > "${APP_DIR}/.env" <<ENVEOF
            APP_HOST=0.0.0.0
            APP_PORT=8000
            DB_DSN=${DB_DSN}
            ARTIFACTS_S3_ENDPOINT=${ARTIFACTS_S3_ENDPOINT}
            ARTIFACTS_S3_REGION=${ARTIFACTS_S3_REGION}
            ARTIFACTS_S3_ACCESS_KEY_ID=${ARTIFACTS_S3_ACCESS_KEY_ID}
            ARTIFACTS_S3_SECRET_ACCESS_KEY=${ARTIFACTS_S3_SECRET_ACCESS_KEY}
            ARTIFACTS_S3_BUCKET=${ARTIFACTS_S3_BUCKET}
            ARTIFACTS_S3_PREFIX=missions
            RPI_BASE_URL=${RPI_BASE_URL}
            RPI_MISSIONS_DIR=${RPI_MISSIONS_DIR}
            RPI_RTSP_PORT=${RPI_RTSP_PORT}
            RPI_RTSP_PATH_PREFIX=live
            RPI_TIMEOUT_SEC=10
            ENVEOF
            sed -i 's/^[[:space:]]*//' "${APP_DIR}/.env"

            # ── Write platform.env for Airflow stack ──
            cat > "${APP_DIR}/infra/platform.env" <<ENVEOF
            AIRFLOW_DB_USER=${AIRFLOW_DB_USER}
            AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
            AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}
            AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
            AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}
            DB_DSN=${DB_DSN}
            ARTIFACTS_S3_ENDPOINT=${ARTIFACTS_S3_ENDPOINT}
            ARTIFACTS_S3_REGION=${ARTIFACTS_S3_REGION}
            ARTIFACTS_S3_ACCESS_KEY_ID=${ARTIFACTS_S3_ACCESS_KEY_ID}
            ARTIFACTS_S3_SECRET_ACCESS_KEY=${ARTIFACTS_S3_SECRET_ACCESS_KEY}
            ARTIFACTS_S3_BUCKET=${ARTIFACTS_S3_BUCKET}
            ARTIFACTS_S3_PREFIX=missions
            BATCH_IMAGE=${BATCH_IMAGE}
            DOCKER_GID=${DOCKER_GID}
            ENVEOF
            sed -i 's/^[[:space:]]*//' "${APP_DIR}/infra/platform.env"

            # ── Initialize app schema in Supabase (idempotent) ──
            docker run --rm \
              --env-file "${APP_DIR}/.env" \
              "${ONLINE_IMAGE}" \
              uv run python -m rescue_ai.interfaces.cli.init_remote_db

            # ── Deploy online service ──
            docker rm -f rescue-ai-online 2>/dev/null || true
            docker run -d \
              --name rescue-ai-online \
              --restart unless-stopped \
              --network host \
              --env-file "${APP_DIR}/.env" \
              "${ONLINE_IMAGE}"

            # ── Deploy Airflow stack ──
            cd "${APP_DIR}/infra"

            docker compose --env-file platform.env \
              -f docker-compose.platform.yml \
              up -d airflow-webserver airflow-scheduler

            # ── Health check ──
            sleep 5
            curl -sf http://127.0.0.1:8000/health || echo "WARNING: online health check failed"

            echo "Deploy complete"
