name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch

      - name: Run black
        run: uv run black --check rescue_ai tests scripts

      - name: Run isort
        run: uv run isort --check-only rescue_ai tests scripts

      - name: Run flake8
        run: uv run flake8 rescue_ai tests scripts

      - name: Run mypy
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run mypy rescue_ai tests

      - name: Run pylint
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pylint rescue_ai tests scripts

      - name: Validate batch DAG syntax
        run: python -m py_compile infra/airflow/dags/rescue_batch_daily.py

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rescue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d rescue_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch --extra inference --extra postgres

      - name: Run all tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEST_POSTGRES_DSN: postgresql://test:test@localhost:5432/rescue_test
        run: uv run pytest tests --ignore=tests/architecture --cov=rescue_ai --cov-fail-under=70

  architecture-boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch

      - name: Verify architecture boundaries
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest tests/architecture --no-cov

  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - architecture-boundaries
      - secrets
    if: ${{ always() }}

    steps:
      - name: Validate upstream jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.architecture-boundaries.result }}" != "success" ] || \
             [ "${{ needs.secrets.result }}" != "success" ]; then
            echo "Quality gate failed: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, architecture-boundaries=${{ needs.architecture-boundaries.result }}, secrets=${{ needs.secrets.result }}"
            exit 1
          fi

          echo "Quality gate passed"
