name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.14"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run black
        run: uv run black --check rescue_ai tests scripts

      - name: Run isort
        run: uv run isort --check-only rescue_ai tests scripts

      - name: Run flake8
        run: uv run flake8 rescue_ai tests scripts

      - name: Run mypy
        run: uv run mypy rescue_ai tests scripts

      - name: Run pylint
        run: uv run pylint rescue_ai tests scripts

      - name: Compile-check Airflow DAGs
        run: python -m py_compile infra/airflow/dags/rescue_batch_daily.py

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rescue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d rescue_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_DSN: postgresql://test:test@localhost:5432/rescue_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.14"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch --extra postgres

      - name: Run tests
        run: uv run pytest --cov=rescue_ai --cov-report=term-missing --cov-fail-under=70

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    if: ${{ always() }}

    steps:
      - name: Validate upstream jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "Quality gate failed: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}"
            exit 1
          fi

          echo "Quality gate passed"
