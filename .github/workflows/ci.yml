name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch

      - name: Run black
        run: uv run black --check services libs tests

      - name: Run isort
        run: uv run isort --check-only services libs tests

      - name: Run flake8
        run: uv run flake8 services libs tests

      - name: Run mypy
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run mypy services libs tests

      - name: Run pylint
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pylint services libs tests

      - name: Validate batch DAG syntax
        run: python -m py_compile infra/airflow/dags/idempotent_docker_backfill_demo.py

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch

      - name: Run unit and smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest tests --ignore=tests/architecture -m "not integration" --cov=services --cov=libs --cov-fail-under=70

  architecture-boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.10.4"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --extra batch

      - name: Verify architecture boundaries
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run pytest tests/architecture --no-cov

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - architecture-boundaries
    if: ${{ always() }}

    steps:
      - name: Validate upstream jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.architecture-boundaries.result }}" != "success" ]; then
            echo "Quality gate failed: lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, architecture-boundaries=${{ needs.architecture-boundaries.result }}"
            exit 1
          fi
          echo "Quality gate passed"
