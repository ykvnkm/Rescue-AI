global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/rescue_rules.yml

scrape_configs:
  - job_name: "api_gateway"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "airflow"
    static_configs:
      - targets: ["airflow-webserver:8080"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

