# Профиль `dev` — kind / minikube на ноуте разработчика.
# Самодостаточный smoke: API + локальные Postgres/MinIO subcharts,
# простые kube Secret'ы, без Vault/TLS/Ingress.

rescue-ai-api:
  enabled: true
  image:
    repository: rescue-ai/online
    tag: "local"
    pullPolicy: IfNotPresent
  deployment:
    deploymentMode: offline
    appEnv: dev
    logLevel: DEBUG
  config:
    storage:
      s3Endpoint: "http://rescue-ai-minio.rescue-ai.svc.cluster.local:9000"
      s3Bucket: rescue-artifacts
  security:
    tlsMode: "off"
  secrets:
    source: kube
    kube:
      inline:
        DB_DSN: "postgresql://rescue:rescue@rescue-ai-postgresql.rescue-ai.svc.cluster.local:5432/rescue_ai"
        ARTIFACTS_S3_ACCESS_KEY_ID: "rescueadmin"
        ARTIFACTS_S3_SECRET_ACCESS_KEY: "rescueadmin"
  ingress:
    enabled: false

rescue-ai-sync-worker:
  enabled: false

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  auth:
    username: rescue
    password: rescue
    database: rescue_ai
  primary:
    initdb:
      scriptsConfigMap: pg-init
minio:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  auth:
    rootUser: rescueadmin
    rootPassword: rescueadmin
  defaultBuckets: "rescue-artifacts"
vault:
  enabled: false
