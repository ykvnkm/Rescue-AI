{{- if and .Values.enabled .Values.modelCache.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rescue-ai-detection.fullname" . }}-models
  labels:
    {{- include "rescue-ai-detection.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.modelCache.size }}
{{- end }}
