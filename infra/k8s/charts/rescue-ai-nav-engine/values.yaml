enabled: false  # включается в profile values при разделении сервисов

replicaCount: 1

image:
  repository: rescue-ai/online
  pullPolicy: IfNotPresent
  tag: "local"

deployment:
  logLevel: INFO
  appEnv: dev

service:
  type: ClusterIP
  port: 8001

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}
