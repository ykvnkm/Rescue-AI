# Дефолты под dev-кластер (kind / minikube). Cloud / offline / hybrid
# переопределяют то, что отличается, через umbrella values-файлы.

replicaCount: 1

image:
  repository: rescue-ai/online
  pullPolicy: IfNotPresent
  tag: "local"

imagePullSecrets: []

deployment:
  # Профиль ADR-0007. Меняется в values/<profile>.yaml.
  deploymentMode: cloud
  # Уровень логирования API. DEBUG включает navigation logs.
  logLevel: INFO
  appEnv: dev
  serviceVersion: dev

# Конфиг через ConfigMap. Секреты идут отдельно — либо через Vault
# Agent Injector, либо через kube-Secret (см. secrets.* ниже).
config:
  rpi:
    baseUrl: ""
    missionsDir: ""
    rtspPort: 8554
    rtspPathPrefix: live
    timeoutSec: 10
  storage:
    s3Endpoint: ""
    s3Region: ru-central1
    s3Bucket: ""
    s3Prefix: missions
  detection:
    httpTimeoutSec: 1.0

  # ADR-0008 §1: если развёрнуты сервисы rescue-ai-nav-engine /
  # rescue-ai-detection, проставь сюда их Service-URL — API
  # переключится на HTTP-адаптеры портов. Пустые строки = монолит.
  services:
    navEngineUrl: ""
    navEngineTimeoutSec: 30.0
    detectorUrl: ""
    detectorTimeoutSec: 30.0

# Канал до Raspberry Pi. mTLS управляется на уровне самого пода
# (см. ADR-0007 §4). Для cloud-профиля можно ставить tlsMode: off.
security:
  tlsMode: "off"
  ca:
    # Имя secret'а в кластере с cert-материалом, если tlsMode=mtls.
    # Вытащит ключи: ca.crt, client.crt, client.key.
    existingSecret: ""

# Источник секретов: vault | kube | none.
#
# vault — Vault Agent Injector рендерит файлы в /vault/secrets, init-script
#         подгружает их как env (см. шаблон deployment).
# kube  — обычный k8s Secret, монтируется через envFrom.
# none  — секреты не монтируются (для голого dev/CI).
secrets:
  source: kube
  kube:
    # Имя существующего Secret. Если оставить пустым, чарт создаст
    # rescue-ai-api-secret из inline-полей ниже (только dev!).
    existingSecret: ""
    inline:
      DB_DSN: ""
      ARTIFACTS_S3_ACCESS_KEY_ID: ""
      ARTIFACTS_S3_SECRET_ACCESS_KEY: ""
  vault:
    role: rescue-ai-api
    # Путь в KV v2: secret/data/<path>.
    secretPath: rescue-ai/api

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: rescue-ai.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false
