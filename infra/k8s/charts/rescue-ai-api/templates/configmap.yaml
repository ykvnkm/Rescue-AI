apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rescue-ai-api.fullname" . }}-config
  labels:
    {{- include "rescue-ai-api.labels" . | nindent 4 }}
data:
  # Несекретные опции — подаются через envFrom.configMapRef.
  ARTIFACTS_S3_ENDPOINT: {{ .Values.config.storage.s3Endpoint | quote }}
  ARTIFACTS_S3_REGION: {{ .Values.config.storage.s3Region | quote }}
  ARTIFACTS_S3_BUCKET: {{ .Values.config.storage.s3Bucket | quote }}
  ARTIFACTS_S3_PREFIX: {{ .Values.config.storage.s3Prefix | quote }}
  RPI_BASE_URL: {{ .Values.config.rpi.baseUrl | quote }}
  RPI_MISSIONS_DIR: {{ .Values.config.rpi.missionsDir | quote }}
  RPI_RTSP_PORT: {{ .Values.config.rpi.rtspPort | quote }}
  RPI_RTSP_PATH_PREFIX: {{ .Values.config.rpi.rtspPathPrefix | quote }}
  RPI_TIMEOUT_SEC: {{ .Values.config.rpi.timeoutSec | quote }}
  DETECTION_HTTP_TIMEOUT_SEC: {{ .Values.config.detection.httpTimeoutSec | quote }}
  NAV_ENGINE_URL: {{ .Values.config.services.navEngineUrl | default "" | quote }}
  DETECTOR_URL: {{ .Values.config.services.detectorUrl | default "" | quote }}
  TLS_MODE: {{ .Values.security.tlsMode | toString | quote }}
  {{- if eq (.Values.security.tlsMode | toString) "mtls" }}
  TLS_CA_CERT_PATH: "/app/certs/station-root-ca.crt"
  TLS_CLIENT_CERT_PATH: "/app/certs/gcs-client.crt"
  TLS_CLIENT_KEY_PATH: "/app/certs/gcs-client.key"
  {{- end }}
