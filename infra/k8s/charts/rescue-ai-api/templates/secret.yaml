{{/*
Чартовый Secret создаётся ТОЛЬКО при secrets.source=kube + пустом
existingSecret. Это dev-режим: значения встраиваются прямо в helm
release. В prod значения должны приходить через Vault Agent Injector
(secrets.source=vault), либо как существующий externally-managed Secret.
*/}}
{{- if and (eq .Values.secrets.source "kube") (not .Values.secrets.kube.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rescue-ai-api.kubeSecretName" . }}
  labels:
    {{- include "rescue-ai-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.kube.inline }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
