name: rescue-platform

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file:
    - ${PLATFORM_ENV_FILE:-./platform.env}
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_AIRFLOW_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__METRICS__STATSD_ON: "True"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 9125
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    BATCH_MISSION_ID: ${BATCH_MISSION_ID}
    BATCH_CODE_VERSION: ${BATCH_CODE_VERSION}
    BATCH_MODEL_VERSION: ${BATCH_MODEL_VERSION}
    BATCH_ARTIFACT_BACKEND: ${BATCH_ARTIFACT_BACKEND}
    BATCH_STATUS_BACKEND: ${BATCH_STATUS_BACKEND}
    BATCH_MISSION_ROOT: ${BATCH_MISSION_ROOT}
    BATCH_ARTIFACT_ROOT: ${BATCH_ARTIFACT_ROOT}
    BATCH_STATUS_PATH: ${BATCH_STATUS_PATH}
    BATCH_POSTGRES_DSN: ${BATCH_POSTGRES_DSN}
    BATCH_S3_ENDPOINT: ${BATCH_S3_ENDPOINT}
    BATCH_S3_BUCKET: ${BATCH_S3_BUCKET}
    BATCH_S3_PREFIX: ${BATCH_S3_PREFIX}
    BATCH_S3_ACCESS_KEY: ${BATCH_S3_ACCESS_KEY}
    BATCH_S3_SECRET_KEY: ${BATCH_S3_SECRET_KEY}
    BATCH_S3_REGION: ${BATCH_S3_REGION}
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-docker==3.11.0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
    - airflow_shared_data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    env_file:
      - ${PLATFORM_ENV_FILE:-./platform.env}
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_DEFAULT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    env_file:
      - ${PLATFORM_ENV_FILE:-./platform.env}
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_EXPORTER_USER}:${POSTGRES_EXPORTER_PASSWORD}@postgres:5432/${POSTGRES_DEFAULT_DB}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2026-02-14T03-28-17Z
    env_file:
      - ${PLATFORM_ENV_FILE:-./platform.env}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2026-02-14T00-52-50Z
    env_file:
      - ${PLATFORM_ENV_FILE:-./platform.env}
    entrypoint: ["/bin/sh", "/init/create-bucket.sh"]
    volumes:
      - ./minio/create-bucket.sh:/init/create-bucket.sh:ro
    depends_on:
      minio:
        condition: service_healthy

  statsd-exporter:
    image: prom/statsd-exporter:v0.27.2
    ports:
      - "9102:9102"
      - "9125:9125/udp"

  batch-runner-image:
    build:
      context: ..
      dockerfile: Dockerfile
    image: rescue-ai-batch:local
    command: ["bash", "-lc", "echo rescue-ai-batch image built"]
    profiles:
      - batch-build

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username ${AIRFLOW_ADMIN_USER}
        --firstname Platform
        --lastname Admin
        --role Admin
        --email ${AIRFLOW_ADMIN_EMAIL}
        --password ${AIRFLOW_ADMIN_PASSWORD}
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=14d
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.2
    env_file:
      - ${PLATFORM_ENV_FILE:-./platform.env}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  airflow_shared_data:
    name: airflow_shared_data
