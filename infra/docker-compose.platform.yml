name: rescue-platform

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
    network: host
  image: rescue-airflow:local
  user: "0:0"
  env_file:
    - ${PLATFORM_ENV_FILE:-./platform.env}
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_DSN}
    AIRFLOW__DATABASE__SQL_ALCHEMY_SCHEMA: airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    BATCH_IMAGE: ${BATCH_IMAGE}
    DB_DSN: ${DB_DSN}
    ARTIFACTS_S3_ENDPOINT: ${ARTIFACTS_S3_ENDPOINT}
    ARTIFACTS_S3_REGION: ${ARTIFACTS_S3_REGION}
    ARTIFACTS_S3_ACCESS_KEY_ID: ${ARTIFACTS_S3_ACCESS_KEY_ID}
    ARTIFACTS_S3_SECRET_ACCESS_KEY: ${ARTIFACTS_S3_SECRET_ACCESS_KEY}
    ARTIFACTS_S3_BUCKET: ${ARTIFACTS_S3_BUCKET}
    ARTIFACTS_S3_PREFIX: ${ARTIFACTS_S3_PREFIX}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
    - airflow_shared_data:/opt/airflow/data

services:
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --firstname Platform --lastname Admin --role Admin --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD} || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
  airflow_shared_data:
    name: airflow_shared_data
