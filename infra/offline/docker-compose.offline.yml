name: rescue-offline

# Field-station stack (ADR-0007). All dependencies are local; no
# outbound connections are required. Postgres + MinIO are persisted on
# host volumes and the API/sync-worker images carry preloaded model
# weights so the first start works without internet.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OFFLINE_DB_USER:-rescue}
      POSTGRES_PASSWORD: ${OFFLINE_DB_PASSWORD:-rescue}
      POSTGRES_DB: ${OFFLINE_DB_NAME:-rescue_ai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OFFLINE_DB_USER:-rescue} -d ${OFFLINE_DB_NAME:-rescue_ai}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - offline_pg_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${OFFLINE_DB_PORT:-5432}:5432"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OFFLINE_S3_ACCESS_KEY:-rescueadmin}
      MINIO_ROOT_PASSWORD: ${OFFLINE_S3_SECRET_KEY:-rescueadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - offline_minio_data:/data
    ports:
      - "${OFFLINE_S3_PORT:-9000}:9000"
      - "${OFFLINE_S3_CONSOLE_PORT:-9001}:9001"

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      sh -c "mc alias set local http://minio:9000 ${OFFLINE_S3_ACCESS_KEY:-rescueadmin} ${OFFLINE_S3_SECRET_KEY:-rescueadmin} &&
      mc mb -p local/${OFFLINE_S3_BUCKET:-rescue-artifacts} || true"
    restart: "no"

  api:
    image: ${ONLINE_IMAGE:-rescue-ai/online:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.offline
    environment:
      # DEPLOYMENT_MODE приходит из .env.offline (offline | hybrid).
      # Оверрайд тут заблокировал бы переключение на hybrid.
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      DB_DSN: "postgresql://${OFFLINE_DB_USER:-rescue}:${OFFLINE_DB_PASSWORD:-rescue}@postgres:5432/${OFFLINE_DB_NAME:-rescue_ai}"
      ARTIFACTS_S3_ENDPOINT: "http://minio:9000"
      ARTIFACTS_S3_ACCESS_KEY_ID: ${OFFLINE_S3_ACCESS_KEY:-rescueadmin}
      ARTIFACTS_S3_SECRET_ACCESS_KEY: ${OFFLINE_S3_SECRET_KEY:-rescueadmin}
      ARTIFACTS_S3_BUCKET: ${OFFLINE_S3_BUCKET:-rescue-artifacts}
    volumes:
      - model_cache:/app/runtime/models
      - ../../scripts/security/out:/app/certs:ro
    ports:
      - "${APP_PORT:-8000}:8000"

  # Hybrid-only: drains the local outbox into remote Postgres/S3 when
  # connectivity returns. Disabled by default — start it with
  # `--profile hybrid` once DEPLOYMENT_MODE=hybrid is set in .env.offline.
  sync-worker:
    image: ${ONLINE_IMAGE:-rescue-ai/online:local}
    restart: unless-stopped
    profiles: ["hybrid"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.offline
    environment:
      # sync-worker имеет смысл только в hybrid; убедись, что в
      # .env.offline стоит DEPLOYMENT_MODE=hybrid, иначе контейнер
      # умышленно завершится с SystemExit (см. run_worker.main).
      DB_DSN: "postgresql://${OFFLINE_DB_USER:-rescue}:${OFFLINE_DB_PASSWORD:-rescue}@postgres:5432/${OFFLINE_DB_NAME:-rescue_ai}"
    command: ["python", "-m", "rescue_ai.infrastructure.sync.run_worker"]

volumes:
  offline_pg_data:
  offline_minio_data:
  model_cache:
